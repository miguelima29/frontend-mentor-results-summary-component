<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./src/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="result">
        <h2>Your Result</h2>

        <div class="score">
          <h1>76</h1>
          <h5>of 100</h5>
        </div>

        <div class="score-text">
          <h1>Great</h1>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
      </div>

      <div class="summary">
        <h2>Summary</h2>

        <div class="summary-item">
          <div class="summary-item-icon">
            <div class="summary-item-icon-reaction">
              <img src="./src/icon-reaction.svg" alt="Reaction icon" />
              <h3>Reaction</h3>
              </div>
            <h4>80 <span class="summary-item-score">/ 100</span></h4>
          </div>

          <div class="summary-item-icon">
            <div class="summary-item-icon-memory">
              <img src="./src/icon-memory.svg" alt="Memory icon" />
              <h3>Memory</h3>
            </div> 
            <h4>92 <span class="summary-item-score">/ 100</span></h4>
          </div>

          <div class="summary-item-icon">
            <div class="summary-item-icon-verbal">
              <img src="./src/icon-verbal.svg" alt="Verbal icon" />
              <h3>Verbal</h3>
            </div>
            <h4>61 <span class="summary-item-score">/ 100</span></h4>
          </div>

          <div class="summary-item-icon">
            <div class="summary-item-icon-visual">
              <img src="./src/icon-visual.svg" alt="Visual icon" />
              <h3>Visual</h3>
            </div>
            <h4>73 <span class="summary-item-score">/ 100</span></h4>
          </div>
        </div>

        <button>Continue</button>
      </div>
    </div>
  </body>
</html>
